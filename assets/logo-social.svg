<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1200" height="630" fill="#0d1117"/>

    <!-- Gradient Definitions -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
        </linearGradient>
    </defs>

    <rect width="1200" height="630" fill="url(#bgGradient)"/>

    <!-- Decorative Elements -->
    <circle cx="100" cy="100" r="150" fill="#29b6f6" opacity="0.05"/>
    <circle cx="1100" cy="530" r="180" fill="#0d3b66" opacity="0.1"/>

    <!-- Logo - Rounded Square Background -->
    <rect x="150" y="245" width="140" height="140" rx="20" ry="20" fill="#0d3b66"/>

    <!-- Top Chevron (scaled for logo) -->
    <polyline points="185,335 220,300 255,335" fill="none" stroke="#29b6f6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bottom Chevron (scaled for logo) -->
    <polyline points="185,355 220,320 255,355" fill="none" stroke="#29b6f6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Circle -->
    <circle cx="220" cy="365" r="7" fill="#29b6f6"/>

    <!-- Horizontal Line -->
    <line x1="175" y1="378" x2="265" y2="378" stroke="#29b6f6" stroke-width="8" stroke-linecap="round"/>

    <!-- Main Title -->
    <text x="330" y="260" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">
        Infrastructure Talks
    </text>

    <!-- Subtitle with Blue Color -->
    <text x="330" y="320" font-family="Arial, sans-serif" font-size="34" font-weight="600" fill="#29b6f6">
        DAS &amp; Partners Engineering Consultancy
    </text>

    <!-- Description -->
    <text x="330" y="380" font-family="Arial, sans-serif" font-size="26" fill="#8b949e">
        Top Engineering Firm in UAE
    </text>

    <!-- Location -->
    <text x="330" y="425" font-family="Arial, sans-serif" font-size="26" fill="#8b949e">
        Dubai • Sharjah • Abu Dhabi
    </text>

    <!-- Bottom Tagline -->
    <text x="330" y="520" font-family="Arial, sans-serif" font-size="22" fill="#6b7280">
        Expert insights on Roads, Utilities &amp; Marine Infrastructure
    </text>
</svg>
